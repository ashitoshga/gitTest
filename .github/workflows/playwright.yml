name: Playwright Tests
on: #event triggers section
 schedule: 
  - cron: '0 0 * * *'
 workflow_dispatch:
env:
 BASE_URL: https://playwright.dev/
jobs:
  test:
    timeout-minutes: 30
    runs-on: windows-latest
    strategy:
      matrix: # Parallel execution matrix
       browsers: [chromium, firefox, webkit]
    steps:
    - uses: actions/checkout@v4 #clone main repository to local runner
    - uses: actions/setup-node@v4 #Installs Node.js on the runner machine
      with:
        node-version: lts/*  #Selects the latest Long-Term Support version of Node.js
    - name: Install dependencies
      run: npm ci # install project-specific packages
    - name: Install Playwright Browsers
    #Installing only required browser at a time
      run: npx playwright install ${{matrix.browsers}} --with-deps
      
    - name: Install Allure Playwright Reporter
      run: npm install allure-playwright --save-dev
    - name: Install Allure CLI
      run: npm install -g allure-commandline
      
    - name: Run Playwright tests
    #running tests on all 3 browsers at the same time
      run: npx playwright test tests/example.spec.ts --project=${{matrix.browsers}}
   
    - name: Generate Allure-report
      if: always()
      run: npx allure generate allure-results -o allure-report
      
    - name: Upload allure-report
      uses: actions/upload-artifact@v4 # upload artifact command
      if: always()
      with:  #path of the allure report folder
       name: allure-report ${{matrix.browsers}}
       path: allure-report/
       
