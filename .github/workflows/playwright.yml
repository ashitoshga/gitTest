name: Playwright Tests
on: #event triggers section
 schedule: 
  - cron: '0 0 * * *'
 workflow_dispatch:
jobs:
  test:
    timeout-minutes: 30
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4 #clone main repository to local runner
    - uses: actions/setup-node@v4 #Installs Node.js on the runner machine
      with:
        node-version: lts/*  #Selects the latest Long-Term Support version of Node.js
    - name: Install dependencies
      run: npm ci # install project-specific packages
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test example.spec.ts
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
